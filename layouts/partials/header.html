<header class="site-header">
  <nav class="nav-container">
    <a href="/{{ .Lang }}/" class="logo">
      <img src="/img/logo.png" alt="KJMC" class="logo-img" width="32" height="32" fetchpriority="high">
      <span class="logo-text">{{ if eq .Lang "uk" }}КЄМО Ужгород{{ else }}KJMC Uzhhorod{{ end }}</span>
    </a>
    <button class="nav-toggle" aria-label="Menu" onclick="document.querySelector('.nav-links').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links">
      {{ if eq .Lang "uk" }}
      <a href="/uk/">Головна</a>
      <a href="/uk/pro-nas/">Про нас</a>
      <a href="/uk/pozhertvy/">Пожертви</a>
      <a href="/uk/kontakty/">Контакти</a>
      {{ else }}
      <a href="/en/">Home</a>
      <a href="/en/about/">About</a>
      <a href="/en/donate/">Donate</a>
      <a href="/en/contact/">Contact</a>
      {{ end }}
      <a href="{{ .Site.Params.donateURL }}" class="btn-donate" target="_blank" rel="noopener">
        {{ if eq .Lang "uk" }}Пожертвувати{{ else }}Donate{{ end }}
      </a>
      {{ range .Translations }}
      <a href="{{ .Permalink }}" class="lang-switch">{{ .Language.LanguageName }}</a>
      {{ end }}
    </div>
  </nav>
</header>
